name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            os: ubuntu-latest
            archive: tar
          - rid: osx-arm64
            os: macos-latest
            archive: tar
          - rid: osx-x64
            os: macos-latest
            archive: tar
          - rid: win-x64
            os: windows-latest
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Test
        run: dotnet test tiktok-dl.slnx --configuration Release

      - name: Publish
        run: >
          dotnet publish TikTokDl.CLI/TikTokDl.CLI.csproj
          -r ${{ matrix.rid }}
          -c Release
          -p:SelfContained=true
          -p:PublishSingleFile=true
          -o ./publish/${{ matrix.rid }}

      - name: Archive (tar)
        if: matrix.archive == 'tar'
        run: tar -czf tiktok-dl-${{ matrix.rid }}.tar.gz -C ./publish/${{ matrix.rid }} tiktok-dl

      - name: Archive (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: Compress-Archive -Path ./publish/${{ matrix.rid }}/tiktok-dl.exe -DestinationPath tiktok-dl-${{ matrix.rid }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: tiktok-dl-${{ matrix.rid }}
          path: tiktok-dl-${{ matrix.rid }}.*

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            tiktok-dl-linux-x64.tar.gz
            tiktok-dl-osx-arm64.tar.gz
            tiktok-dl-osx-x64.tar.gz
            tiktok-dl-win-x64.zip
